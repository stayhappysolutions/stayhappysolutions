
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="author" content="StayHappy Solutions">
    <title>Quote Requests | StayHappy Solutions</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-1: #0b0f19;
            --bg-2: #161b2e;
            --accent: #6366f1;
            --accent-2: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: #d8dfe9;
            --border: rgba(255,255,255,0.08);
            --glass: rgba(255,255,255,0.04);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 20%, #1e2540 0%, var(--bg-1) 50%, #05070d 100%);
            color: var(--text-primary);
            padding: 24px;
        }

        #signInDiv, #messagesDiv {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            padding: 40px;
            width: 440px;
            max-width: 100%;
        }

        #messagesDiv { width: 640px; }

        h2 {
            margin: 0 0 28px 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder { color: #dbe0e6; font-weight: bold; }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
        }

        button {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            border: none;
            padding: 13px 24px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            margin-top: 8px;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 8px 24px rgba(99,102,241,0.35);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(99,102,241,0.45);
        }

        button:active { transform: translateY(0); }

        .secondary-btn {
            background: rgba(255,255,255,0.05);
            box-shadow: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .secondary-btn:hover {
            background: rgba(255,255,255,0.08);
            box-shadow: none;
            color: var(--text-primary);
        }

        #messages {
            max-height: 480px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 6px;
        }

        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        #messages::-webkit-scrollbar-track { background: transparent; }

        #messages ul { list-style: none; padding: 0; margin: 0; }

        .msg-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 12px;
            transition: background 0.2s, border-color 0.2s;
        }

        .msg-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(99,102,241,0.3);
        }

        .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .msg-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-primary);
        }

        .msg-time {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .msg-meta {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .msg-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(99,102,241,0.15);
            color: #a5b4fc;
            padding: 4px 10px;
            border-radius: 100px;
            margin-bottom: 10px;
        }

        .msg-body {
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .empty-state, .loading-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
            font-size: 14px;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            #signInDiv, #messagesDiv { width: 100%; padding: 28px 20px; }
            h2 { font-size: 22px; }
        }

        #c{position:fixed;inset:0;width:100%;height:100%}
        .vignette{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 0%,rgba(0,0,0,.08) 50%,rgba(0,0,0,.70) 100%)}

        @media (max-width:1024px){
        .vignette{background:radial-gradient(ellipse 90% 90% at 50% 50%,transparent 0%,rgba(0,0,0,.10) 50%,rgba(0,0,0,.75) 100%)}
        }

        @media (max-width:768px){
        .vignette{background:radial-gradient(ellipse 100% 100% at 50% 50%,transparent 0%,rgba(0,0,0,.12) 45%,rgba(0,0,0,.80) 100%)}
        }

        .forhomeback {
            background: rgba(255,255,255,0.05);
            box-shadow: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .forhomeback:hover {
            background: rgba(255,255,255,0.08);
            box-shadow: none;
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .forhomeback a {
            display: block;
            width: 100%;
            height: 100%;
        }

          .shs-widget, .shs-widget * { box-sizing: border-box; }

          .shs-widget {
            --shs-bg: #F7F5EF;
            --shs-surface: #FFFFFF;
            --shs-ink: #1B2420;
            --shs-muted: #6E7A72;
            --shs-primary: #14524A;
            --shs-primary-dark: #0B332D;
            --shs-accent: #D9A441;
            --shs-accent-soft: #F3E4C2;
            --shs-border: #E5E1D3;
            --shs-danger: #B5533E;
        
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--shs-ink);
            background: var(--shs-bg);
            border: 1px solid var(--shs-border);
            border-radius: 16px;
            padding: 32px;
            max-width: 640px;
            margin: 0 auto;
          }
        
          .shs-widget h2, .shs-widget h3 {
            font-family: 'Fraunces', Georgia, serif;
            margin: 0;
          }
        
          /* Header with progress ring */
          .shs-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 16px;
          }
        
          .shs-header-text h2 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--shs-primary-dark);
          }
        
          .shs-header-text p {
            margin: 4px 0 0;
            font-size: 13px;
            color: var(--shs-muted);
          }
        
          .shs-ring-wrap {
            position: relative;
            width: 56px;
            height: 56px;
            flex-shrink: 0;
          }
        
          .shs-ring-wrap svg { transform: rotate(-90deg); }
        
          .shs-ring-track { stroke: var(--shs-accent-soft); fill: none; stroke-width: 5; }
        
          .shs-ring-progress {
            stroke: var(--shs-accent);
            fill: none;
            stroke-width: 5;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.4s ease;
          }
        
          .shs-ring-label {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--shs-primary-dark);
          }
        
          /* Tabs */
          .shs-tabs {
            display: flex;
            gap: 4px;
            background: var(--shs-accent-soft);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 20px;
            width: fit-content;
          }
        
          .shs-tab {
            border: none;
            background: transparent;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            color: var(--shs-primary-dark);
            border-radius: 7px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
          }
        
          .shs-tab.is-active {
            background: var(--shs-primary);
            color: #fff;
          }
        
          .shs-panel { display: none; }
          .shs-panel.is-active { display: block; }
        
          /* Input row */
          .shs-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
          }
        
          .shs-input {
            flex: 1;
            border: 1px solid var(--shs-border);
            background: var(--shs-surface);
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 14px;
            font-family: inherit;
            color: var(--shs-ink);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
          }
        
          .shs-input:focus {
            border-color: var(--shs-primary);
            box-shadow: 0 0 0 3px rgba(20, 82, 74, 0.12);
          }
        
          textarea.shs-input {
            resize: vertical;
            min-height: 44px;
            line-height: 1.4;
          }
        
          .shs-btn-add {
            border: none;
            background: var(--shs-primary);
            color: #fff;
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
          }
        
          .shs-btn-add:hover { background: var(--shs-primary-dark); }
        
          /* Task list */
          .shs-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
          }
        
          .shs-task {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--shs-surface);
            border: 1px solid var(--shs-border);
            border-radius: 10px;
            padding: 12px 14px;
          }
        
          .shs-check {
            width: 19px;
            height: 19px;
            flex-shrink: 0;
            border: 1.5px solid var(--shs-muted);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            padding: 0;
            transition: background 0.15s, border-color 0.15s;
          }
        
          .shs-check.is-checked {
            background: var(--shs-primary);
            border-color: var(--shs-primary);
          }
        
          .shs-check.is-checked::after {
            content: '';
            width: 5px;
            height: 9px;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(45deg) translate(-1px, -1px);
          }
        
          .shs-task-text {
            flex: 1;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
            outline: none;
          }
        
          .shs-task.is-done .shs-task-text {
            color: var(--shs-muted);
            text-decoration: line-through;
            text-decoration-color: var(--shs-muted);
          }
        
          .shs-icon-btn {
            border: none;
            background: transparent;
            color: var(--shs-muted);
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
          }
        
          .shs-icon-btn:hover { background: #FBEAE5; color: var(--shs-danger); }
        
          .shs-icon-btn svg { width: 15px; height: 15px; }
        
          /* Notes grid */
          .shs-notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
          }
        
          .shs-note {
            background: var(--shs-surface);
            border: 1px solid var(--shs-border);
            border-left: 3px solid var(--shs-accent);
            border-radius: 10px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 100px;
          }
        
          .shs-note-text {
            font-size: 13.5px;
            line-height: 1.5;
            color: var(--shs-ink);
            flex: 1;
            outline: none;
            word-break: break-word;
            white-space: pre-wrap;
          }
        
          .shs-note-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
          }
        
          .shs-note-date {
            font-size: 11px;
            color: var(--shs-muted);
          }
        
          /* Empty state */
          .shs-empty {
            text-align: center;
            padding: 32px 16px;
            color: var(--shs-muted);
            font-size: 13.5px;
            border: 1px dashed var(--shs-border);
            border-radius: 10px;
          }
        
          @media (max-width: 480px) {
            .shs-widget { padding: 20px; border-radius: 12px; }
            .shs-input-row { flex-direction: column; }
            .shs-btn-add { padding: 11px; }
          }

    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="vignette"></div>
    
    <div id="signInDiv">
    <h2>Quote Requests</h2>
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com"/>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••"/>
        </div>
        <button onclick="signIn()">Sign In</button>
    </div>

    <div id="messagesDiv" style="display:none;">
        <h2>Enquiries</h2>
        <div id="messages"><div class="loading-state"><div class="spinner"></div>Loading messages…</div></div>
        <button class="secondary-btn" onclick="signOut()">Sign Out</button>
        <button class="forhomeback"><a  style="text-decoration: none; color: inherit;" href="index.html">Home</a></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGyyKBomw_ZZibi5X8VB80JQoBTkOKP34",
            authDomain: "stayhappy-solution-database.firebaseapp.com",
            projectId: "stayhappy-solution-database",
            storageBucket: "stayhappy-solution-database.firebasestorage.app",
            messagingSenderId: "578043913796",
            appId: "1:578043913796:web:bb04188aeda8fbeecbbe11",
            measurementId: "G-Q2CLPR4027"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.signIn = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert("Error signing in: " + error.message);
            }
        }

        window.signOut = function() {
            signOut(auth).then(() => {
                document.getElementById('messagesDiv').style.display = 'none';
                document.getElementById('signInDiv').style.display = 'block';
            }).catch((error) => {
                alert("Error signing out: " + error.message);
            });
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('signInDiv').style.display = 'none';
                document.getElementById('messagesDiv').style.display = 'block';

                try {
                    const querySnapshot = await getDocs(collection(db, 'website_enquiries'));
                    let messagesArray = [];

                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        data.id = doc.id;
                        messagesArray.push(data);
                    });

                    messagesArray.sort((a, b) => {
                        if (a.timestamp && b.timestamp) {
                            return b.timestamp.seconds - a.timestamp.seconds;
                        }
                        return 0;
                    });

                    const messagesEl = document.getElementById('messages');

                    if (messagesArray.length === 0) {
                        messagesEl.innerHTML = '<div class="empty-state">No enquiries yet.</div>';
                        return;
                    }

                    let messagesHtml = '<ul>';
                    messagesArray.forEach((data) => {
                        const timestamp = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString() : 'No timestamp';
                        const phoneNumber = data.phoneNumber ? data.phoneNumber : 'No phone provided';
                        messagesHtml += `
                            <li class="msg-card">
                                <div class="msg-header">
                                    <span class="msg-name">${data.name}</span>
                                    <span class="msg-time">${timestamp}</span>
                                </div>
                                <div class="msg-meta">${data.email} • ${phoneNumber}</div>
                                <div class="msg-tag">${data.projectType}</div>
                                <div class="msg-body">${data.message}</div>
                            </li>`;
                    });
                    messagesHtml += '</ul>';
                    messagesEl.innerHTML = messagesHtml;
                } catch (error) {
                    document.getElementById('messages').innerHTML = '<div class="empty-state">Error loading messages.</div>';
                    console.error("Error fetching messages: ", error);
                }
            } else {
                document.getElementById('messagesDiv').style.display = 'none';
                document.getElementById('signInDiv').style.display = 'block';
            }
        });
    </script>
    
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.155.0/build/three.module.js';

const canvas = document.getElementById('c');
const W = () => window.innerWidth, H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, W()/H(), 0.1, 2000);
camera.position.set(0, 18, 42);
camera.lookAt(0, 0, 0);

// ── Fog layers ──────────────────────────────────────────
const fogGeo = new THREE.PlaneGeometry(200,200);
const fogMat = new THREE.MeshBasicMaterial({color:0x050a2a,transparent:true,opacity:.18,side:THREE.DoubleSide,depthWrite:false});
for(let i=0;i<3;i++){const f=new THREE.Mesh(fogGeo,fogMat.clone());f.rotation.x=Math.PI/2+(i-1)*.3;f.position.y=(i-1)*1.5;scene.add(f)}

// ── Backdrop stars ──────────────────────────────────────
const bgCount=8000,bgPos=new Float32Array(bgCount*3),bgCol=new Float32Array(bgCount*3);
for(let i=0;i<bgCount;i++){const i3=i*3,t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=300+Math.random()*200;bgPos[i3]=r*Math.sin(p)*Math.cos(t);bgPos[i3+1]=r*Math.sin(p)*Math.sin(t);bgPos[i3+2]=r*Math.cos(p);const g=.6+Math.random()*.4;bgCol[i3]=g;bgCol[i3+1]=g;bgCol[i3+2]=g+.1}
const bgG=new THREE.BufferGeometry();bgG.setAttribute('position',new THREE.BufferAttribute(bgPos,3));bgG.setAttribute('color',new THREE.BufferAttribute(bgCol,3));
scene.add(new THREE.Points(bgG,new THREE.PointsMaterial({size:.9,vertexColors:true,transparent:true,opacity:.6,sizeAttenuation:false})));

// ── Galaxy spiral ───────────────────────────────────────
const COUNT=140000,ARMS=5,gPos=new Float32Array(COUNT*3),gCol=new Float32Array(COUNT*3);
for(let i=0;i<COUNT;i++){const i3=i*3,arm=Math.floor(Math.random()*ARMS),t=Math.pow(Math.random(),1.5),radius=1+t*28,aAngle=(arm/ARMS)*Math.PI*2,spin=radius*1.8,scatter=Math.pow(1-t,2)*3+.3;gPos[i3]=Math.cos(aAngle+spin)*radius+(Math.random()-.5)*scatter;gPos[i3+1]=(Math.random()-.5)*(1.5*(1-t*.7));gPos[i3+2]=Math.sin(aAngle+spin)*radius+(Math.random()-.5)*scatter;const dn=radius/28,rnd=Math.random();if(dn<.15){gCol[i3]=1;gCol[i3+1]=.95;gCol[i3+2]=.75}else if(rnd<.18){gCol[i3]=.75+Math.random()*.25;gCol[i3+1]=.85+Math.random()*.15;gCol[i3+2]=1}else if(rnd<.55){gCol[i3]=1;gCol[i3+1]=1;gCol[i3+2]=1}else if(rnd<.78){gCol[i3]=1;gCol[i3+1]=.9;gCol[i3+2]=.6}else{gCol[i3]=.8+Math.random()*.2;gCol[i3+1]=.7;gCol[i3+2]=1}}
const galaxyGeo=new THREE.BufferGeometry();galaxyGeo.setAttribute('position',new THREE.BufferAttribute(gPos,3));galaxyGeo.setAttribute('color',new THREE.BufferAttribute(gCol,3));

// Helper: procedural planet texture on a canvas
function makePlanetTexture(fn, size=512) {
  const cv = document.createElement('canvas'); cv.width=cv.height=size;
  const ctx = cv.getContext('2d'); fn(ctx, size);
  return new THREE.CanvasTexture(cv);
}

// Helper: draw orbit ring
function makeOrbitRing(radius, color=0x334466, opacity=0.18) {
  const pts = [];
  for(let i=0;i<=128;i++) pts.push(new THREE.Vector3(Math.cos(i/128*Math.PI*2)*radius,0,Math.sin(i/128*Math.PI*2)*radius));
  const g=new THREE.BufferGeometry().setFromPoints(pts);
  const m=new THREE.LineBasicMaterial({color,transparent:true,opacity,depthWrite:false});
  return new THREE.Line(g,m);
}

function createGlowSprite(color, size) {
  const cv=document.createElement('canvas');cv.width=cv.height=128;
  const ctx=cv.getContext('2d'),cx=64,cy=64;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,64);
  g.addColorStop(0,color.replace(')',',0.8)').replace('rgb','rgba'));
  g.addColorStop(.4,color.replace(')',',0.3)').replace('rgb','rgba'));
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,128,128);
  const tex=new THREE.CanvasTexture(cv);
  const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
  sprite.scale.setScalar(size);
  return sprite;
}

// ── Camera orbit ─────────────────────────────────────
let phi=1.05,theta0=0,radius0=42,targetPhi=1.05,targetTheta=0;
let isMouseDown=false,lastMX=0,lastMY=0;
canvas.addEventListener('mousedown',e=>{isMouseDown=true;lastMX=e.clientX;lastMY=e.clientY});
window.addEventListener('mouseup',()=>isMouseDown=false);
window.addEventListener('mousemove',e=>{if(!isMouseDown)return;targetTheta-=(e.clientX-lastMX)*.004;targetPhi-=(e.clientY-lastMY)*.003;targetPhi=Math.max(.3,Math.min(1.5,targetPhi));lastMX=e.clientX;lastMY=e.clientY});
window.addEventListener('wheel',e=>{radius0=Math.max(35,Math.min(90,radius0+e.deltaY*.02))},{passive:true});
let lTX=0,lTY=0;
canvas.addEventListener('touchstart',e=>{lTX=e.touches[0].clientX;lTY=e.touches[0].clientY});
canvas.addEventListener('touchmove',e=>{targetTheta-=(e.touches[0].clientX-lTX)*.004;targetPhi-=(e.touches[0].clientY-lTY)*.003;targetPhi=Math.max(.3,Math.min(1.5,targetPhi));lTX=e.touches[0].clientX;lTY=e.touches[0].clientY});

const clk={t:0};
function animate(){
  requestAnimationFrame(animate);
  clk.t+=.001;
  theta0+=(targetTheta-theta0)*.04;
  phi+=(targetPhi-phi)*.04;
  targetTheta+=.00018*60*.001;
  const r=radius0;
  camera.position.x=r*Math.sin(phi)*Math.cos(theta0);
  camera.position.y=r*Math.cos(phi);
  camera.position.z=r*Math.sin(phi)*Math.sin(theta0);
  camera.lookAt(0,0,0);

  galaxy.rotation.y+=.00018;
  galaxy.rotation.z=Math.sin(clk.t*.4)*.004;
  galaxyMat.opacity=.9+Math.sin(clk.t*2.1)*.08;

  asteroids.forEach(a=>{const d=a.userData;d.orbitAngle+=d.orbitSpeed;a.position.x=Math.cos(d.orbitAngle)*d.orbitRadius;a.position.z=Math.sin(d.orbitAngle)*d.orbitRadius;a.position.y=d.yOff+Math.sin(d.orbitAngle*3.1)*.15;a.rotation.x+=d.rotX;a.rotation.y+=d.rotY;a.rotation.z+=d.rotZ});
  heroAsteroids.forEach(a=>{const d=a.userData;d.orbitAngle+=d.orbitSpeed;a.position.x=Math.cos(d.orbitAngle)*d.orbitRadius;a.position.z=Math.sin(d.orbitAngle)*d.orbitRadius;a.position.y=d.yOff;a.rotation.x+=d.rotX;a.rotation.y+=d.rotY;a.rotation.z+=d.rotZ});
  chipMesh.rotation.y+=.00005;

  // Orbit planets
  planets.forEach(p=>{
    p.orbitAngle+=p.speed;
    p.group.position.x=Math.cos(p.orbitAngle)*p.orbitR;
    p.group.position.z=Math.sin(p.orbitAngle)*p.orbitR;
    p.group.position.y=Math.sin(p.orbitAngle*.7)*p.orbitY*.3;
    p.sphere.rotation.y+=p.rotSpeed;

    // Moon orbit around Earth
    if(p.moon!==undefined){
      p.moonAngle+=.012;
      const ex=p.group.position.x,ez=p.group.position.z,ey=p.group.position.y;
      p.moon.position.x=ex+Math.cos(p.moonAngle)*.8;
      p.moon.position.z=ez+Math.sin(p.moonAngle)*.8;
      p.moon.position.y=ey+Math.sin(p.moonAngle*.5)*.08;
      p.moon.rotation.y+=.004;
    }
  });

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{renderer.setSize(W(),H());camera.aspect=W()/H();camera.updateProjectionMatrix()});
</script>
 
<script>
(function () {
  // ---- state (in-memory; swap for your backend / localStorage as needed) ----
  var tasks = [];   // { id, text, done }
  var notes = [];   // { id, text, date }
  var uid = 0;

  var el = {
    tabTasks: document.getElementById('shsTabTasks'),
    tabNotes: document.getElementById('shsTabNotes'),
    panelTasks: document.getElementById('shsPanelTasks'),
    panelNotes: document.getElementById('shsPanelNotes'),
    taskInput: document.getElementById('shsTaskInput'),
    taskAddBtn: document.getElementById('shsTaskAddBtn'),
    taskList: document.getElementById('shsTaskList'),
    taskEmpty: document.getElementById('shsTaskEmpty'),
    noteInput: document.getElementById('shsNoteInput'),
    noteAddBtn: document.getElementById('shsNoteAddBtn'),
    noteGrid: document.getElementById('shsNoteGrid'),
    noteEmpty: document.getElementById('shsNoteEmpty'),
    ring: document.getElementById('shsRing'),
    ringLabel: document.getElementById('shsRingLabel')
  };

  var TRASH_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6h16Z"/></svg>';

  // ---- tabs ----
  function switchTab(name) {
    var isTasks = name === 'tasks';
    el.tabTasks.classList.toggle('is-active', isTasks);
    el.tabNotes.classList.toggle('is-active', !isTasks);
    el.panelTasks.classList.toggle('is-active', isTasks);
    el.panelNotes.classList.toggle('is-active', !isTasks);
  }
  el.tabTasks.addEventListener('click', function () { switchTab('tasks'); });
  el.tabNotes.addEventListener('click', function () { switchTab('notes'); });

  // ---- render: tasks ----
  function renderTasks() {
    el.taskList.innerHTML = '';
    el.taskEmpty.style.display = tasks.length ? 'none' : 'block';

    tasks.forEach(function (task) {
      var li = document.createElement('li');
      li.className = 'shs-task' + (task.done ? ' is-done' : '');

      var check = document.createElement('button');
      check.className = 'shs-check' + (task.done ? ' is-checked' : '');
      check.setAttribute('aria-label', 'Toggle complete');
      check.addEventListener('click', function () {
        task.done = !task.done;
        renderTasks();
        updateProgress();
      });

      var text = document.createElement('span');
      text.className = 'shs-task-text';
      text.contentEditable = 'true';
      text.textContent = task.text;
      text.addEventListener('blur', function () {
        var val = text.textContent.trim();
        task.text = val || task.text;
        text.textContent = task.text;
      });
      text.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); text.blur(); }
      });

      var del = document.createElement('button');
      del.className = 'shs-icon-btn';
      del.innerHTML = TRASH_ICON;
      del.setAttribute('aria-label', 'Delete task');
      del.addEventListener('click', function () {
        tasks = tasks.filter(function (t) { return t.id !== task.id; });
        renderTasks();
        updateProgress();
      });

      li.appendChild(check);
      li.appendChild(text);
      li.appendChild(del);
      el.taskList.appendChild(li);
    });
  }

  function addTask() {
    var val = el.taskInput.value.trim();
    if (!val) return;
    tasks.push({ id: ++uid, text: val, done: false });
    el.taskInput.value = '';
    renderTasks();
    updateProgress();
    el.taskInput.focus();
  }

  el.taskAddBtn.addEventListener('click', addTask);
  el.taskInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') addTask();
  });

  // ---- render: notes ----
  function formatDate(d) {
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function renderNotes() {
    el.noteGrid.innerHTML = '';
    el.noteEmpty.style.display = notes.length ? 'none' : 'block';

    notes.forEach(function (note) {
      var card = document.createElement('div');
      card.className = 'shs-note';

      var text = document.createElement('div');
      text.className = 'shs-note-text';
      text.contentEditable = 'true';
      text.textContent = note.text;
      text.addEventListener('blur', function () {
        var val = text.textContent.trim();
        note.text = val || note.text;
        text.textContent = note.text;
      });

      var footer = document.createElement('div');
      footer.className = 'shs-note-footer';

      var date = document.createElement('span');
      date.className = 'shs-note-date';
      date.textContent = note.date;

      var del = document.createElement('button');
      del.className = 'shs-icon-btn';
      del.innerHTML = TRASH_ICON;
      del.setAttribute('aria-label', 'Delete note');
      del.addEventListener('click', function () {
        notes = notes.filter(function (n) { return n.id !== note.id; });
        renderNotes();
      });

      footer.appendChild(date);
      footer.appendChild(del);
      card.appendChild(text);
      card.appendChild(footer);
      el.noteGrid.appendChild(card);
    });
  }

  function addNote() {
    var val = el.noteInput.value.trim();
    if (!val) return;
    notes.unshift({ id: ++uid, text: val, date: formatDate(new Date()) });
    el.noteInput.value = '';
    renderNotes();
    el.noteInput.focus();
  }

  el.noteAddBtn.addEventListener('click', addNote);
  el.noteInput.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') addNote();
  });

  // ---- progress ring ----
  function updateProgress() {
    var total = tasks.length;
    var done = tasks.filter(function (t) { return t.done; }).length;
    var pct = total ? Math.round((done / total) * 100) : 0;
    var circumference = 150.8;
    el.ring.style.strokeDashoffset = circumference - (circumference * pct / 100);
    el.ringLabel.textContent = pct + '%';
  }

  // ---- init ----
  renderTasks();
  renderNotes();
  updateProgress();
})();
</script>
